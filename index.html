<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassan Mousavi — Arch Viz Artist</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0A0A0F;
  --navy: #0F0F1E;
  --navy2: #141428;
  --gold: #C9A84C;
  --gold-light: #E2C97A;
  --white: #F0EDE8;
  --gray: #6B6B7A;
  --gray2: #9A9AAA;
}

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  transition: filter 0.8s ease;
}

/* ── SCROLL VISUAL STAGES ── */
body.stage-1 { filter: grayscale(1) brightness(0.8) contrast(0.9); }
body.stage-2 { filter: grayscale(0.6) brightness(1) contrast(1); }
body.stage-3 { filter: grayscale(0.2) brightness(1.1) contrast(1.1); }
body.stage-4 { filter: grayscale(0) brightness(1.15) contrast(1.2); }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1.4rem 4rem;
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, transparent 100%);
  backdrop-filter: blur(8px);
  transition: background 0.3s;
}

nav.scrolled { background: rgba(10,10,15,0.97); }

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  color: var(--gold);
  text-decoration: none;
}

.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a {
  color: var(--gray2);
  text-decoration: none;
  font-size: 0.78rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ── HERO ── */
#hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 4rem;
  position: relative;
}

.hero-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 7vw, 7rem);
}

/* ── SECTIONS (shortened, unchanged styles preserved) ── */
section { width: 100%; }

/* ── PROJECTS ── */
.project-card {
  position: relative;
  overflow: hidden;
  aspect-ratio: 4/3;
  background: var(--navy2);
}

.project-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}

/* ── GOLD DIVIDER ── */
.gold-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  nav { padding: 1rem 1.5rem; }
}
</style>
</head>

<body class="stage-1">

<!-- NAV -->
<nav id="navbar">
  <a href="#hero" class="nav-logo">H.M</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <h1 class="hero-name">Hassan Mousavi</h1>
</section>

<div class="gold-divider"></div>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
</section>

<div class="gold-divider"></div>

<!-- SKILLS -->
<section id="skills">
  <h2>Skills</h2>
</section>

<div class="gold-divider"></div>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="project-card">
    <img class="project-img" src="project1.jpg">
  </div>

  <div class="project-card">
    <img class="project-img" src="project2.jpg">
  </div>

</section>

<div class="gold-divider"></div>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2025 Hassan Mousavi</p>
</footer>

<script>
// NAV SCROLL
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 50);
});

// SCROLL STAGES (MAIN FEATURE)
window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;
  const docHeight = document.body.scrollHeight - window.innerHeight;
  const p = scrollY / docHeight;

  document.body.classList.remove('stage-1','stage-2','stage-3','stage-4');

  if (p < 0.25) document.body.classList.add('stage-1');
  else if (p < 0.5) document.body.classList.add('stage-2');
  else if (p < 0.75) document.body.classList.add('stage-3');
  else document.body.classList.add('stage-4');
});
</script>

</body>
</html>
